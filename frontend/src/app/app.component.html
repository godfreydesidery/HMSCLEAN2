<mat-toolbar color="primary" class="app-toolbar">
  <a routerLink="/home" class="app-title">Zana HMIS</a>
  <a
    *appCan="'BILL-A'"
    mat-button
    routerLink="/billing/cashier"
    routerLinkActive="active-nav-link"
    aria-label="Billing and cashiering workspace"
  >Billing</a>
  <span class="toolbar-spacer"></span>
  <app-health-indicator />
  @if (authStore.isAuthenticated()) {
    <button
      mat-icon-button
      class="logout-btn"
      aria-label="Sign out"
      (click)="logout()"
    >
      <mat-icon>logout</mat-icon>
    </button>
  }
</mat-toolbar>

<main class="app-content">
  <router-outlet />
</main>
