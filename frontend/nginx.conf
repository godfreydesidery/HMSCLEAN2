server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Static asset caching ──────────────────────────────────────────────────
    # Angular 18 production builds append a content hash to JS/CSS filenames
    # (e.g. main.XXXXXXXX.js), so they are safe to cache for a long period.
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    # All unmatched paths are served index.html so the Angular router handles
    # client-side navigation without 404s on hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy (DISABLED for Increment 00) ────────────────────────────────
    # In this increment the browser calls http://localhost:8080/api/v1 directly.
    # The backend CORS policy is open (addAllowedOriginPattern("*")), so
    # cross-origin requests work without a proxy.
    #
    # Uncomment the block below when hardening to same-origin in a later
    # increment (e.g. when deploying behind a shared hostname/TLS terminator):
    #
    # location /api/ {
    #     proxy_pass http://backend:8080;
    #     proxy_set_header Host              $host;
    #     proxy_set_header X-Real-IP         $remote_addr;
    #     proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}
