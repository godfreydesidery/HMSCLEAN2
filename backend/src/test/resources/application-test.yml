spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

# Test-only JWT secret. This is NOT a production secret and is acceptable in test config.
# (>= 256-bit so HS256 key-length validation passes.)
hmis:
  jwt:
    secret: test-secret-key-for-hmis-ci-only-please-rotate-0123456789
    issuer: https://hmis.otapp.net
    access-token-ttl-minutes: 15
    refresh-token-ttl-hours: 8
  cors:
    allowed-origins: http://localhost:4200
  # Disable the ward-accrual cron + ShedLock during tests — ITs drive WardAccrualService directly
  # (inc-07 07c-ii). SchedulingConfig is @ConditionalOnProperty(hmis.scheduling.enabled=true).
  scheduling:
    enabled: false

logging:
  level:
    org.testcontainers: INFO
    org.flywaydb: INFO
