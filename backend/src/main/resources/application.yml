spring:
  application:
    name: hmis-backend

  datasource:
    # Local-dev defaults per ADR-0013 (${ENV_VAR:default_for_local}). Real envs inject via env vars;
    # Testcontainers overrides the connection entirely. No production secret is committed here.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hmis}
    username: ${DB_USERNAME:hmis_app}
    password: ${DB_PASSWORD:local_dev_password}
    hikari:
      maximum-pool-size: 10

  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema (ADR-0003, ADR-0013). NEVER 'update'.
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  threads:
    virtual:
      enabled: true

  servlet:
    multipart:
      # Set ABOVE the in-code 10 MiB attachment cap (hmis.attachments.max-file-size-bytes) so the
      # application-layer gate is the binding limit and returns the verbatim 422 "File exceeds
      # maximum file size allowed" (inc-06A C7 review F1). Spring's defaults (1 MB/file, 10 MB/req)
      # would otherwise reject 1–10 MiB uploads with MaxUploadSizeExceededException before the
      # controller runs — a parity regression vs the legacy 10 MiB cap.
      max-file-size: 11MB
      max-request-size: 12MB

# JWT signing — secret consumed ONLY via ${JWT_SECRET}; no literal anywhere (ADR-0013).
hmis:
  jwt:
    secret: ${JWT_SECRET}
    issuer: https://hmis.otapp.net
    access-token-ttl-minutes: 15
    refresh-token-ttl-hours: 8
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  attachments:
    # Base directory for local-disk attachment storage (inc-06A C7 / ITEM5, legacy-parity).
    # Blank → falls back to ${java.io.tmpdir}/hmis-attachments (suitable for dev/test).
    # Production: inject HMIS_ATTACHMENTS_PATH pointing to a persistent, backed-up volume.
    base-path: ${HMIS_ATTACHMENTS_PATH:}
    # 10 MiB cap — verbatim legacy guard (PatientServiceImpl.java:2842-2844).
    max-file-size-bytes: 10485760
  # Background scheduling (ADR-0018, inc-07 07c-ii / CR-07-Q2). Enabled by default; tests set
  # hmis.scheduling.enabled=false so the ward-accrual cron + ShedLock do not fire during the suite.
  scheduling:
    enabled: ${HMIS_SCHEDULING_ENABLED:true}
  jobs:
    ward-accrual:
      # ADR-0018 JOB-001: 00:05 daily. Calendar-night cron (net-new MECHANISM; the accrual
      # TOTAL/STATUS semantics are legacy parity — CR-07-Q2 accepted the midnight-vs-rolling-24h variance).
      cron: ${HMIS_WARD_ACCRUAL_CRON:0 5 0 * * *}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  # Declare application/json as the default produced media type so the generated
  # OpenAPI marks responses as application/json (not the Spring default '*/*').
  # The typescript-angular client uses the Accept type to pick responseType: a
  # '*/*' accept makes it parse bodies as TEXT, breaking JSON deserialization
  # (e.g. login TokenResponse). See frontend api codegen.
  default-produces-media-type: application/json
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080
