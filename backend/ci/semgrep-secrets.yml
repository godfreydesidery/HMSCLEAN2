rules:
  - id: no-hardcoded-hmac-signing-literal
    patterns:
      - pattern: new com.nimbusds.jose.crypto.MACSigner("...")
    message: >
      Hardcoded HMAC signing literal detected. Use a SecretKey derived from an
      environment variable (e.g. jwtProperties.secret()) instead.
    languages: [java]
    severity: ERROR

  - id: no-hardcoded-hmac256-literal
    patterns:
      - pattern: com.auth0.jwt.algorithms.Algorithm.HMAC256("...")
    message: >
      Hardcoded HMAC256 literal detected (legacy auth0 pattern). This must not
      appear in the modern codebase.
    languages: [java]
    severity: ERROR

  - id: no-hardcoded-secret-key-spec-literal
    patterns:
      - pattern: new javax.crypto.spec.SecretKeySpec("...", ...)
      - pattern: new jakarta.crypto.spec.SecretKeySpec("...", ...)
    message: >
      Hardcoded string literal passed to SecretKeySpec. Derive key bytes from
      an environment variable, not a source-literal.
    languages: [java]
    severity: ERROR

  - id: no-hardcoded-secret-variable-assignment
    patterns:
      - pattern: |
          String $VAR = "...";
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(secret|signingKey|jwtKey|hmacKey|jwtSecret)
    message: >
      String literal assigned to a variable whose name suggests it is a secret
      (matches: secret, signingKey, jwtKey, hmacKey, jwtSecret). Use an
      environment variable or configuration property instead.
    languages: [java]
    severity: WARNING
