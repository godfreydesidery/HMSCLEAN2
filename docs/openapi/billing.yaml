openapi: 3.0.1
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost
  description: Generated server url
paths:
  /api/v1/billing/invoices/uid/{uid}/payments:
    post:
      tags:
      - patient-invoice-controller
      operationId: recordPayment
      parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordPaymentRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PatientPaymentDto"
  /api/v1/billing/bills/uid/{billUid}/cancellation:
    post:
      tags:
      - credit-note-controller
      operationId: cancelCharge
      parameters:
      - name: billUid
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelChargeRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CancellationResultDto"
  /api/v1/billing/reports/collections:
    get:
      tags:
      - billing-report-controller
      operationId: collectionsReport
      parameters:
      - name: from
        in: query
        required: true
        schema:
          type: string
          format: date
      - name: to
        in: query
        required: true
        schema:
          type: string
          format: date
      - name: cashier
        in: query
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CollectionReportRow"
  /api/v1/billing/payments/uid/{uid}/receipt:
    get:
      tags:
      - billing-report-controller
      operationId: receipt
      parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ReceiptDto"
  /api/v1/billing/invoices:
    get:
      tags:
      - patient-invoice-controller
      operationId: listInvoices
      parameters:
      - name: patientUid
        in: query
        required: true
        schema:
          type: string
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum:
          - PENDING
          - APPROVED
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatientInvoiceDto"
  /api/v1/billing/invoices/uid/{uid}:
    get:
      tags:
      - patient-invoice-controller
      operationId: getInvoice
      parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PatientInvoiceDto"
  /api/v1/billing/credit-notes:
    get:
      tags:
      - credit-note-controller
      operationId: listCreditNotes
      parameters:
      - name: patientUid
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CreditNoteDto"
  /api/v1/billing/credit-notes/uid/{uid}:
    get:
      tags:
