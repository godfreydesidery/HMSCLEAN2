openapi: 3.0.1
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost
  description: Generated server url
paths:
  /api/v1/patients/uid/{uid}:
    get:
      tags:
      - patient-controller
      operationId: getByUid
      parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PatientDto"
    put:
      tags:
      - patient-controller
      operationId: updatePatient
      parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatientRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PatientDto"
  /api/v1/patients:
    get:
      tags:
      - patient-controller
      operationId: search
      parameters:
      - name: query
        in: query
        required: false
        schema:
          type: string
          default: ""
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PatientSearchResult"
    post:
      tags:
      - patient-controller
      operationId: registerPatient
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPatientRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PatientDto"
  /api/v1/patients/uid/{uid}/send-to-doctor:
    post:
      tags:
      - patient-controller
      operationId: sendToDoctor
      parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendToDoctorRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
