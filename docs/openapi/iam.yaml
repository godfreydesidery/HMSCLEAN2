components:
  schemas:
    UpdateUserRequest:
      required:
      - firstName
      - lastName
      - nickname
      type: object
      properties:
        firstName:
          type: string
        middleName:
          type: string
        lastName:
          type: string
        nickname:
          type: string
        password:
          maxLength: 50
          minLength: 0
          type: string
        enabled:
          type: boolean
        roleNames:
          type: array
          items:
            type: string
    UserResponse:
      type: object
      properties:
        uid:
          type: string
        userNo:
          type: string
        firstName:
          type: string
        middleName:
          type: string
        lastName:
          type: string
        nickname:
          type: string
        username:
          type: string
        enabled:
          type: boolean
        roleNames:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
    AssignRolesRequest:
      required:
      - roleNames
      type: object
      properties:
        roleNames:
          type: array
          items:
            type: string
    UpdateRoleRequest:
      required:
      - name
      type: object
      properties:
        name:
          maxLength: 80
          minLength: 0
          type: string
    RoleResponse:
      type: object
      properties:
        uid:
          type: string
        name:
          type: string
        owner:
          type: string
        privilegeCodes:
          type: array
          items:
            type: string
    ReplaceRolePrivilegesRequest:
      required:
      - privilegeCodes
      type: object
      properties:
        privilegeCodes:
          type: array
          items:
            type: string
    CreateUserRequest:
      required:
      - firstName
      - lastName
      - nickname
      - password
      - username
      type: object
      properties:
        username:
          maxLength: 50
          minLength: 3
          type: string
        password:
          maxLength: 50
          minLength: 4
          type: string
        firstName:
          type: string
        middleName:
          type: string
        lastName:
          type: string
        nickname:
          type: string
        roleNames:
          type: array
          items:
            type: string
    CreateRoleRequest:
      required:
      - name
      type: object
      properties:
        name:
          maxLength: 80
          minLength: 0
          type: string
    TokenRequest:
      required:
      - password
      - username
      type: object
      properties:
        username:
          type: string
        password:
          type: string
    TokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
        expiresInSeconds:
          type: integer
          format: int64
        privileges:
          type: array
          items:
            type: string
    RevokeRequest:
      required:
      - refreshToken
      type: object
      properties:
        refreshToken:
          type: string
    RefreshRequest:
      required:
      - refreshToken
      type: object
      properties:
        refreshToken:
          type: string
    UserSummaryResponse:
      type: object
      properties:
        uid:
          type: string
        userNo:
          type: string
        username:
          type: string
        displayName:
          type: string
        enabled:
          type: boolean
        roleNames:
          type: array
          items:
            type: string
    PrivilegeResponse:
      type: object
      properties:
        uid:
          type: string
        code:
          type: string
        category:
          type: string
    CompanyProfileDto:
      type: object
      properties:
        uid:
          type: string
        name:
          type: string
        address:
          type: string
        phone:
          type: string
