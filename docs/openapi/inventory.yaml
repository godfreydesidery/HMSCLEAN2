components:
  schemas:
    Detail:
      type: "object"
      properties:
        uid:
          type: "string"
        itemUid:
          type: "string"
        qty:
          type: "number"
        price:
          type: "number"
    GrnBatchRequest:
      required:
      - "batchNo"
      - "qty"
      type: "object"
      properties:
        batchNo:
          type: "string"
        manufacturedDate:
          type: "string"
          format: "date"
        expiryDate:
          type: "string"
          format: "date"
        qty:
          type: "number"
    GrnDto:
      type: "object"
      properties:
        uid:
          type: "string"
        "no":
          type: "string"
        status:
          type: "string"
        statusDescription:
          type: "string"
        storeUid:
          type: "string"
        localPurchaseOrderUid:
          type: "string"
        details:
          type: "array"
          items:
            $ref: "#/components/schemas/Detail"
    Line:
      type: "object"
      properties:
        uid:
          type: "string"
        itemUid:
          type: "string"
        medicineUid:
          type: "string"
        orderedQty:
          type: "number"
        transferedStoreQty:
          type: "number"
        transferedPharmacyQty:
          type: "number"
    LpoDetailRequest:
      required:
      - "itemUid"
      - "qty"
      type: "object"
      properties:
        itemUid:
          type: "string"
        qty:
          type: "number"
    LpoDto:
      type: "object"
      properties:
        uid:
          type: "string"
        "no":
          type: "string"
        status:
          type: "string"
        statusDescription:
          type: "string"
        storeUid:
          type: "string"
        supplierUid:
          type: "string"
        orderDate:
          type: "string"
          format: "date"
        validUntil:
          type: "string"
          format: "date"
        details:
          type: "array"
          items:
            $ref: "#/components/schemas/Detail"
    LpoRequest:
      required:
      - "storeUid"
      - "supplierUid"
      type: "object"
      properties:
        storeUid:
          type: "string"
        supplierUid:
          type: "string"
        orderDate:
          type: "string"
          format: "date"
        validUntil:
          type: "string"
          format: "date"
    PpRoDetailRequest:
      required:
      - "medicineUid"
      - "orderedQty"
      type: "object"
      properties:
